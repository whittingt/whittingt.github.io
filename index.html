<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom Whittington</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      line-height: 1.65;
      color: #1a1a1a;
      background: #faf9f7;
      padding: 0 1rem;
    }

    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    /* ── Typography ── */
    h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.5px; }
    h2 { font-size: 1rem; font-weight: 400; font-style: italic; color: #555; margin-bottom: 1.25rem; }
    h3 { font-size: 1rem; font-weight: 500; margin-bottom: 0.2rem; }
    p  { margin-bottom: 0.75rem; }
    a  { color: #1a1a1a; }
    a:hover { color: #555; }

    /* ── Section labels ── */
    .section-label {
      font-family: Georgia, serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    /* ── Dividers ── */
    hr {
      border: none;
      border-top: 0.5px solid #ccc;
      margin: 2rem 0;
    }

    /* ── Two-column layout ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 0 2.5rem;
    }

    .col-main  { min-width: 0; }
    .col-side  { min-width: 0; padding-top: 0.25rem; }

    /* ── Nav ── */
    nav {
      display: flex;
      gap: 1.25rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-top: 0.5rem;
    }
    nav a { color: #888; text-decoration: none; }
    nav a:hover { color: #1a1a1a; }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      .main-grid { grid-template-columns: 1fr; }
      .col-side  { border-top: 0.5px solid #ccc; padding-top: 1.5rem; margin-top: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    Hello, World!
  </div>
</body>
</html>
